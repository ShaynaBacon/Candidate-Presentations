<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Dashboard</title>

https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.jsscript>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #003B46;
  color: white;
}

#dashboard {
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.slide {
  display: none;
  padding: 40px;
}

.slide.active {
  display: block;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 20px;
  border: none;
  background: #C9A84C;
  color: #003B46;
  cursor: pointer;
}

.skill-pill {
  display: inline-block;
  padding: 5px 10px;
  margin: 5px;
  border-radius: 20px;
  background: #07575B;
}

.case-card {
  background: rgba(255,255,255,0.08);
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}

#nav {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<!-- ✅ DASHBOARD -->
<div id="dashboard">
  <h2>Candidate Dashboard</h2>

  <textarea id="resumeInput" placeholder="Paste resume here..." rows="6" style="width:95%;"></textarea><br>

  <button onclick="generateCandidate()">Generate Candidate</button>

  <div id="candidateList"></div>
</div>

<!-- ✅ PRESENTATION -->
<div id="presentation" style="display:none;">

  <!-- SLIDE 1 -->
  <div class="slide active">
    <h1 id="name"></h1>
    <h3 id="role"></h3>
    <p id="summary"></p>

    <div id="stats"></div>
    <div id="skills"></div>
  </div>

  <!-- SLIDE 2 -->
  <div class="slide">
    <h2>Case Studies</h2>
    <div id="cases"></div>
  </div>

  <!-- SLIDE 3 -->
  <div class="slide">
    <h2>Recruiter Score</h2>
    <h1 id="score"></h1>

    <h3>Strengths</h3>
    <ul id="strengths"></ul>

    <h3>Watchouts</h3>
    <ul id="risks"></ul>

    <h3>Recommendation</h3>
    <p id="rec"></p>
  </div>

  <div id="nav">
    <button onclick="changeSlide(-1)">Prev</button>
    <button onclick="changeSlide(1)">Next</button>
    <button onclick="downloadPDF()">PDF</button>
  </div>

</div>

<script>

let slides, current = 0;
let candidates = [];
let activeData = null;

function changeSlide(dir){
  current = (current + dir + slides.length) % slides.length;
  showSlide(current);
}

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

/* ✅ ROLE DETECTION */
function detectRole(text){
  if(text.includes("java")) return "Java Developer";
  if(text.includes(".net") || text.includes("c#")) return ".NET Developer";
  if(text.includes("react") || text.includes("frontend")) return "React Developer";
  return "Fullstack Developer";
}

/* ✅ AUTO PARSING */
function generateCandidate(){
  const text = document.getElementById("resumeInput").value.toLowerCase();

  const role = detectRole(text);

  const data = {
    name: "New Candidate",
    role: role,
    summary: "Auto-generated candidate based on resume input.",

    stats: [
      text.includes("10") ? "10+ Years" : "Experienced",
      role,
      text.includes("aws") ? "AWS" : "Cloud",
      "Full Stack"
    ],

    skills: [
      text.includes("java") && "Java",
      text.includes("spring") && "Spring",
      text.includes("react") && "React",
      text.includes("angular") && "Angular",
      text.includes("aws") && "AWS",
      text.includes(".net") && ".NET"
    ].filter(Boolean),

    caseStudies: [
      {title:"Enterprise Work", impact:"Worked on production systems"},
      {title:"Cloud Systems", impact:"Handled scalable systems"},
      {title:"UI Work", impact:"Built modern UI"}
    ],

    score:{
      rating:"8/10",
      strengths:["Strong experience","Relevant stack"],
      risks:["Need deeper validation"],
      rec:"Proceed"
    }
  };

  candidates.push(data);
  renderDashboard();
}

/* ✅ DASHBOARD VIEW */
function renderDashboard(){
  const list = document.getElementById("candidateList");
  list.innerHTML="";

  candidates.forEach((c,i)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`<b>${c.name}</b><br>${c.role}`;
    div.onclick=()=>openCandidate(c);
    list.appendChild(div);
  });
}

/* ✅ PRESENTATION VIEW */
function openCandidate(data){
  activeData = data;

  document.getElementById("dashboard").style.display="none";
  document.getElementById("presentation").style.display="block";

  slides = document.querySelectorAll(".slide");
  current = 0;

  document.getElementById("name").textContent=data.name;
  document.getElementById("role").textContent=data.role;
  document.getElementById("summary").textContent=data.summary;

  renderBlocks(data);
}

function renderBlocks(data){
  stats.innerHTML="";
  data.stats.forEach(s=>{
    stats.innerHTML += `<div class="card">${s}</div>`;
  });

  skills.innerHTML="";
  data.skills.forEach(s=>{
    skills.innerHTML += `<span class="skill-pill">${s}</span>`;
  });

  cases.innerHTML="";
  data.caseStudies.forEach(c=>{
    cases.innerHTML += `<div class="case-card"><b>${c.title}</b><br>${c.impact}</div>`;
  });

  score.textContent=data.score.rating;

  strengths.innerHTML="";
  data.score.strengths.forEach(s=>{
    strengths.innerHTML += `<li>${s}</li>`;
  });

  risks.innerHTML="";
  data.score.risks.forEach(r=>{
    risks.innerHTML += `<li>${r}</li>`;
  });

  rec.textContent=data.score.rec;
}

/* ✅ PDF */
function downloadPDF(){
  html2pdf().from(document.body).save("Candidate.pdf");
}

</script>

</body>
</html>
