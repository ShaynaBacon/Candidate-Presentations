<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Presentation</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #003B46;
    color: white;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    padding: 60px;
  }

  .slide.active {
    display: block;
  }

  #nav {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
  }

  button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
  }

  .stat-card {
    background: rgba(255,255,255,0.1);
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    display: inline-block;
  }

  .skill-pill {
    background: #07575B;
    padding: 6px 12px;
    margin: 5px;
    border-radius: 20px;
    display: inline-block;
  }

</style>
</head>

<body>

<!-- ✅ DATA BLOCK -->
<script>
window.data = {
  firstName: "Srinika",
  lastName: "Patloori",
  role: "Senior Fullstack Developer",
  summary: "Senior fullstack engineer with 12+ years building microservices and cloud-native applications.",
  skills: ["Java","Spring Boot","Angular","React","AWS","Kafka"],
  stats: [
    "12+ Years Experience",
    "Enterprise Full Stack",
    "AWS + Microservices",
    "Insurance Domain"
  ],
  caseStudies: [
    { title:"AIG Platform", impact:"Built scalable microservices for insurance systems"},
    { title:"Amazon Systems", impact:"Designed event-driven Kafka architecture"},
    { title:"Nationwide Portal", impact:"Modernized Angular frontends"}
  ]
};
</script>

<!-- ✅ SLIDES -->
<div class="slide active">
  <h1 id="name"></h1>
  <p id="role"></p>
  <p id="summary"></p>

  <div id="statsContainer"></div>
  <div id="skillsContainer"></div>
</div>

<div class="slide">
  <h2>Case Studies</h2>
  <div id="caseContainer"></div>
</div>

<div class="slide">
  <h2>End</h2>
</div>

<!-- ✅ NAV -->
<div id="nav">
  <button onclick="changeSlide(-1)">Prev</button>
  <button onclick="changeSlide(1)">Next</button>
</div>

<!-- ✅ WORKING SCRIPT -->
<script>

let slides = document.querySelectorAll('.slide');
let current = 0;

function showSlide(index){
  slides.forEach(s => s.classList.remove("active"));
  slides[index].classList.add("active");
}

function changeSlide(dir){
  current = (current + dir + slides.length) % slides.length;
  showSlide(current);
}

document.addEventListener("DOMContentLoaded", () => {

  // ✅ Populate basic info
  document.getElementById("name").textContent =
    data.firstName + " " + data.lastName;

  document.getElementById("role").textContent = data.role;
  document.getElementById("summary").textContent = data.summary;

  // ✅ Stats
  const statsContainer = document.getElementById("statsContainer");
  data.stats.forEach(stat => {
    const div = document.createElement("div");
    div.className = "stat-card";
    div.textContent = stat;
    statsContainer.appendChild(div);
  });

  // ✅ Skills
  const skillsContainer = document.getElementById("skillsContainer");
  data.skills.forEach(skill => {
    const div = document.createElement("div");
    div.className = "skill-pill";
    div.textContent = skill;
    skillsContainer.appendChild(div);
  });

  // ✅ Case Studies
  const caseContainer = document.getElementById("caseContainer");
  data.caseStudies.forEach(c => {
    const div = document.createElement("div");
    div.className = "stat-card";
    div.innerHTML = "<b>" + c.title + "</b><br>" + c.impact;
    caseContainer.appendChild(div);
  });

});

</script>

</body>
</html>
