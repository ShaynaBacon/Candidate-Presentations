<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candidate Presentation</title>

<!-- ✅ PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#003B46;
  color:white;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  padding:60px;
}
.slide.active{display:block;}

h1{font-size:60px;}
h1 span{display:block;color:#C9A84C;}

#role{opacity:.7;}
#summary{margin:20px 0;max-width:500px;}

textarea{
  width:90%;
  height:150px;
  margin-top:10px;
}

#statsContainer,#skillsContainer{
  margin-top:20px;
}

.stat-card{
  display:inline-block;
  background:rgba(255,255,255,.08);
  padding:15px;
  margin:6px;
  border-radius:12px;
}

.skill-pill{
  background:#07575B;
  padding:6px 12px;
  margin:5px;
  border-radius:20px;
  display:inline-block;
}

#caseContainer{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.case-card{
  background:rgba(255,255,255,.07);
  padding:15px;
  border-radius:12px;
}

#nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

button{
  padding:10px 14px;
  margin:5px;
  background:#C9A84C;
  color:#003B46;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- ✅ SLIDE 0 (INPUT) -->
<div class="slide active">
  <h2>Paste Resume</h2>

  <textarea id="resumeInput" placeholder="Paste resume here..."></textarea><br>

  <button onclick="generateFromResume()">Generate Presentation</button>
</div>

<!-- ✅ SLIDE 1 -->
<div class="slide">
  <h1><span id="firstName"></span><span id="lastName"></span></h1>
  <div id="role"></div>
  <div id="summary"></div>

  <div id="statsContainer"></div>
  <div id="skillsContainer"></div>
</div>

<!-- ✅ SLIDE 2 -->
<div class="slide">
  <h2>Case Studies</h2>
  <div id="caseContainer"></div>
</div>

<!-- ✅ SLIDE 3 -->
<div class="slide">
  <h2>Recruiter Score</h2>
  <h1 id="scoreContainer"></h1>

  <h3>Strengths</h3>
  <ul id="strengths"></ul>

  <h3>Watchouts</h3>
  <ul id="watchouts"></ul>

  <h3>Recommendation</h3>
  <p id="recommendation"></p>
</div>

<!-- ✅ NAV -->
<div id="nav">
  <button onclick="changeSlide(-1)">Prev</button>
  <button onclick="changeSlide(1)">Next</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<script>

let slides;
let current=0;
let data={};

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  slides[i].classList.add("active");
}

function changeSlide(dir){
  current=(current+dir+slides.length)%slides.length;
  showSlide(current);
}

function generateFromResume(){

  const text=document.getElementById("resumeInput").value.toLowerCase();

  // ✅ VERY SIMPLE extraction logic
  data={
    firstName:"Candidate",
    lastName:"Profile",
    role: text.includes("java") ? "Java Fullstack Developer" : "Fullstack Developer",
    summary:"Experienced developer extracted from resume input.",

    stats:[
      text.includes("years") ? "10+ Years Experience" : "Experienced Developer",
      text.includes("aws") ? "AWS Cloud" : "Cloud Ready",
      text.includes("microservices") ? "Microservices" : "Enterprise Systems",
      "Full Stack"
    ],

    skills:[
      text.includes("java") && "Java",
      text.includes("spring") && "Spring Boot",
      text.includes("angular") && "Angular",
      text.includes("react") && "React",
      text.includes("aws") && "AWS"
    ].filter(Boolean),

    caseStudies:[
      {title:"Enterprise System", client:"Client A", impact:"Worked on enterprise platform"},
      {title:"Cloud Migration", client:"Client B", impact:"Built scalable cloud services"},
      {title:"UI Modernization", client:"Client C", impact:"Improved frontend experience"}
    ],

    score:{
      rating:"8/10",
      strengths:["Strong backend","Cloud exposure","Enterprise systems"],
      risks:["Details need validation"],
      recommendation:"Proceed to interview"
    }
  };

  renderData();
  changeSlide(1);
}

function renderData(){

  firstName.textContent=data.firstName;
  lastName.textContent=data.lastName;
  role.textContent=data.role;
  summary.textContent=data.summary;

  statsContainer.innerHTML="";
  data.stats.forEach(s=>{
    const div=document.createElement("div");
    div.className="stat-card";
    div.textContent=s;
    statsContainer.appendChild(div);
  });

  skillsContainer.innerHTML="";
  data.skills.forEach(s=>{
    const div=document.createElement("div");
    div.className="skill-pill";
    div.textContent=s;
    skillsContainer.appendChild(div);
  });

  caseContainer.innerHTML="";
  data.caseStudies.forEach(c=>{
    const div=document.createElement("div");
    div.className="case-card";
    div.innerHTML=`<b>${c.title}</b><br>${c.client}<br>${c.impact}`;
    caseContainer.appendChild(div);
  });

  scoreContainer.textContent=data.score.rating;

  strengths.innerHTML="";
  data.score.strengths.forEach(s=>{
    const li=document.createElement("li");
    li.textContent=s;
    strengths.appendChild(li);
  });

  watchouts.innerHTML="";
  data.score.risks.forEach(r=>{
    const li=document.createElement("li");
    li.textContent=r;
    watchouts.appendChild(li);
  });

  recommendation.textContent=data.score.recommendation;
}

// PDF
function downloadPDF(){
  html2pdf().from(document.body).save("Candidate.pdf");
}

document.addEventListener("DOMContentLoaded",()=>{
  slides=document.querySelectorAll(".slide");
});

</script>

</body>
</html>
