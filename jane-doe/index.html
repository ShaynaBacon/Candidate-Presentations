<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Presentation</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#003B46;
  color:white;
  overflow:hidden;
}

.slide {
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  padding:60px;
}

.slide.active { display:block; }

button {
  padding:10px;
  margin:5px;
}

#nav {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}

.stat-card {
  background:rgba(255,255,255,0.1);
  margin:10px;
  padding:15px;
  border-radius:10px;
  display:inline-block;
}

.skill-pill {
  background:#07575B;
  padding:6px 12px;
  margin:5px;
  border-radius:20px;
  display:inline-block;
}
</style>
</head>

<body>

<!-- ✅ DATA (ONLY ONE DATA BLOCK — DO NOT DUPLICATE) -->
<script>
window.data = {
  firstName: "Srinika",
  lastName: "Patloori",
  role: "Senior Fullstack Developer",
  summary: "Senior fullstack engineer with 12+ years building microservices and cloud-native systems.",
  skills: ["Java","Spring Boot","Angular","React","AWS","Kafka"],
  stats: [
    "12+ Years Experience",
    "Enterprise Full Stack",
    "AWS + Microservices",
    "Insurance Domain"
  ],
  caseStudies: [
    {title:"AIG Platform", impact:"Built scalable insurance microservices"},
    {title:"Amazon Systems", impact:"Designed Kafka event-driven systems"},
    {title:"Nationwide Portal", impact:"Modernized Angular UI"}
  ]
};
</script>

<!-- ✅ SLIDE 1 -->
<div class="slide active">
  <h1 id="name"></h1>
  <h3 id="role"></h3>
  <p id="summary"></p>

  <h3>Stats</h3>
  <div id="statsContainer"></div>

  <h3>Skills</h3>
  <div id="skillsContainer"></div>
</div>

<!-- ✅ SLIDE 2 -->
<div class="slide">
  <h2>Case Studies</h2>
  <div id="caseContainer"></div>
</div>

<!-- ✅ SLIDE 3 -->
<div class="slide">
  <h2>End</h2>
</div>

<!-- ✅ NAV -->
<div id="nav">
  <button onclick="changeSlide(-1)">Prev</button>
  <button onclick="changeSlide(1)">Next</button>
</div>

<!-- ✅ ✅ ONE CLEAN SCRIPT ONLY -->
<script>

let slides;
let current = 0;

function showSlide(i){
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function changeSlide(dir){
  current = (current + dir + slides.length) % slides.length;
  showSlide(current);
}

document.addEventListener("DOMContentLoaded", () => {

  slides = document.querySelectorAll('.slide');

  // NAME
  document.getElementById("name").textContent =
    data.firstName + " " + data.lastName;

  document.getElementById("role").textContent = data.role;
  document.getElementById("summary").textContent = data.summary;

  // STATS
  const statsContainer = document.getElementById("statsContainer");
  data.stats.forEach(stat => {
    const div = document.createElement("div");
    div.className = "stat-card";
    div.textContent = stat;
    statsContainer.appendChild(div);
  });

  // SKILLS
  const skillsContainer = document.getElementById("skillsContainer");
  data.skills.forEach(skill => {
    const div = document.createElement("div");
    div.className = "skill-pill";
    div.textContent = skill;
    skillsContainer.appendChild(div);
  });

  // CASE STUDIES
  const caseContainer = document.getElementById("caseContainer");
  data.caseStudies.forEach(c => {
    const div = document.createElement("div");
    div.className = "stat-card";
    div.innerHTML = "<b>" + c.title + "</b><br>" + c.impact;
    caseContainer.appendChild(div);
  });

});

</script>

</body>
</html>
